<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <rect width="200" height="200" fill="#0a0a0a"/>
  <defs>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4AF37;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B8932E;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Dome/Arch -->
  <path d="M 60 80 Q 100 30 140 80" stroke="url(#logoGrad)" stroke-width="6" fill="none" stroke-linecap="round"/>
  
  <!-- Fork -->
  <g transform="translate(50, 90)">
    <rect x="4" y="0" width="4" height="30" fill="url(#logoGrad)"/>
    <rect x="-2" y="24" width="2" height="6" fill="url(#logoGrad)"/>
    <rect x="4" y="24" width="2" height="6" fill="url(#logoGrad)"/>
    <rect x="10" y="24" width="2" height="6" fill="url(#logoGrad)"/>
  </g>
  
  <!-- Knife -->
  <g transform="translate(100, 90)">
    <rect x="-2" y="0" width="4" height="36" fill="url(#logoGrad)"/>
  </g>
  
  <!-- Spoon -->
  <g transform="translate(140, 90)">
    <rect x="-4" y="0" width="8" height="24" fill="url(#logoGrad)"/>
    <ellipse cx="0" cy="30" rx="6" ry="6" fill="url(#logoGrad)"/>
  </g>
  
  <!-- Text -->
  <text x="100" y="160" font-family="serif" font-size="28" font-weight="bold" fill="url(#logoGrad)" text-anchor="middle" letter-spacing="2">URBAN EATS</text>
</svg>